name: Package foundation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  package-scaffold:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Verify package scaffold
        run: npm run verify
